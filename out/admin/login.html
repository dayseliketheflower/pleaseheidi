<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Heidi Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: #FBF7F2;
      color: #2A1F2A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border: 1px solid #E8DDD0;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 24px;
      font-weight: 600;
      color: #5C2D5C;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #8B7B8B;
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #8B7B8B;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      font-family: inherit;
      border: 1px solid #E8DDD0;
      border-radius: 8px;
      background: #FBF7F2;
      color: #2A1F2A;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #5C2D5C; }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      background: #5C2D5C;
      color: #FBF7F2;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.5; cursor: default; }
    .error {
      margin-top: 12px;
      font-size: 13px;
      color: #b94040;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Heidi</div>
    <div class="subtitle">Admin panel</div>
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" autofocus>
    <button id="btn">Sign in</button>
    <div class="error" id="err"></div>
  </div>
  <script>
    const btn = document.getElementById('btn');
    const pw  = document.getElementById('pw');
    const err = document.getElementById('err');

    async function login() {
      if (!pw.value) return;
      btn.disabled = true;
      btn.textContent = 'Signing in\u2026';
      err.textContent = '';
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw.value }),
        });
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          const d = await res.json().catch(() => ({}));
          err.textContent = d.error === 'ADMIN_PASSWORD not configured'
            ? 'Server error: ADMIN_PASSWORD not set in environment.'
            : 'Incorrect password.';
        }
      } catch {
        err.textContent = 'Network error. Please try again.';
      }
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }

    btn.addEventListener('click', login);
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
