<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Heidi Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FBF7F2;
      --surface: #ffffff;
      --primary: #5C2D5C;
      --primary-light: #7A3D7A;
      --text: #2A1F2A;
      --muted: #8B7B8B;
      --border: #E8DDD0;
      --sidebar-w: 220px;
    }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    /* Layout */
    #app { display: flex; min-height: 100vh; }
    #sidebar {
      width: var(--sidebar-w);
      background: var(--primary);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    #sidebar-logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 20px;
      font-weight: 600;
      color: #FBF7F2;
      padding: 28px 24px 8px;
      letter-spacing: -0.01em;
    }
    #sidebar-label {
      font-size: 11px;
      color: rgba(251,247,242,0.5);
      padding: 0 24px 24px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .nav-item {
      display: block;
      padding: 10px 24px;
      color: rgba(251,247,242,0.75);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #FBF7F2; }
    .nav-item.active { background: rgba(255,255,255,0.15); color: #FBF7F2; }
    #sidebar-logout {
      margin-top: auto;
      padding: 20px 24px;
    }
    #sidebar-logout button {
      font-size: 13px;
      color: rgba(251,247,242,0.6);
      background: none;
      border: 1px solid rgba(251,247,242,0.2);
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      width: 100%;
    }
    #sidebar-logout button:hover { opacity: 0.8; }
    /* Main content */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    #topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #topbar h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    /* Mobile tabs */
    #mobile-tabs {
      display: none;
      background: var(--primary);
      padding: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #mobile-tabs::-webkit-scrollbar { display: none; }
    #mobile-tabs-inner {
      display: flex;
      white-space: nowrap;
    }
    .tab-btn {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(251,247,242,0.7);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }
    .tab-btn.active { color: #FBF7F2; border-bottom-color: #FBF7F2; }
    #content { padding: 32px; flex: 1; }
    /* Section */
    .section { display: none; }
    .section.active { display: block; }
    /* Stats row */
    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .stat-chip strong { color: var(--text); font-size: 15px; font-weight: 600; margin-right: 4px; }
    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--primary); }
    select.filter-select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    .btn-secondary {
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }
    .btn-secondary:hover { background: var(--bg); }
    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    thead { background: #F5F0EB; }
    th {
      padding: 11px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text);
      border-bottom: 1px solid #F5F0EB;
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: #FAF7F4; }
    tbody tr.expandable { cursor: pointer; }
    /* Expandable detail row */
    .detail-row { background: #FAF7F4 !important; }
    .detail-row td { padding: 16px 20px; }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .detail-field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    .detail-field p {
      font-size: 13px;
      color: var(--text);
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .detail-field.wide { grid-column: 1 / -1; }
    /* Status badge + dropdown */
    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .status-Pending           { background: #F0EBE0; color: #7A6A4A; }
    .status-Approved          { background: #E3F0E8; color: #2E6B3E; }
    .status-Rejected          { background: #F5E8E8; color: #8B3A3A; }
    .status-Interview { background: #E8E8F5; color: #3A3A8B; }
    select.status-select {
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    /* Loading / empty */
    .loading-row td, .empty-row td {
      text-align: center;
      padding: 48px;
      color: var(--muted);
      font-size: 14px;
    }
    /* Activity log */
    .log-action {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* Truncated text */
    .truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* Responsive */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #mobile-tabs { display: block; }
      #content { padding: 20px 16px; }
      #topbar { padding: 14px 16px; }
      .stats-row { gap: 8px; }
      .toolbar { gap: 8px; }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Sidebar (desktop) -->
  <nav id="sidebar">
    <div id="sidebar-logo">Heidi</div>
    <div id="sidebar-label">Admin</div>
    <button class="nav-item active" onclick="showSection('waitlist',this)">Waitlist</button>
    <button class="nav-item" onclick="showSection('applications',this)">Companion Applications</button>
    <button class="nav-item" onclick="showSection('log',this)">Activity Log</button>
    <div id="sidebar-logout"><button onclick="logout()">Sign out</button></div>
  </nav>

  <div id="main">
    <!-- Mobile tabs -->
    <div id="mobile-tabs">
      <div id="mobile-tabs-inner">
        <button class="tab-btn active" onclick="showSection('waitlist',this)">Waitlist</button>
        <button class="tab-btn" onclick="showSection('applications',this)">Companion Applications</button>
        <button class="tab-btn" onclick="showSection('log',this)">Activity Log</button>
      </div>
    </div>

    <!-- Topbar -->
    <div id="topbar">
      <h2 id="topbar-title">Waitlist</h2>
    </div>

    <!-- Content -->
    <div id="content">

      <!-- SECTION: Waitlist -->
      <div id="section-waitlist" class="section active">
        <div class="stats-row" id="waitlist-stats"></div>
        <div class="toolbar">
          <input class="search-input" id="waitlist-search" placeholder="Search name or email…" oninput="renderWaitlist()">
          <button class="btn-secondary" onclick="exportCSV('waitlist')">Export CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>First Name</th>
                <th>Email</th>
                <th>City</th>
                <th>How They Heard</th>
                <th>Looking For</th>
                <th>Submitted</th>
              </tr>
            </thead>
            <tbody id="waitlist-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- SECTION: Applications -->
      <div id="section-applications" class="section">
        <div class="stats-row" id="app-stats"></div>
        <div class="toolbar">
          <input class="search-input" id="app-search" placeholder="Search name or email…" oninput="renderApplications()">
          <select class="filter-select" id="app-filter" onchange="renderApplications()">
            <option value="">All statuses</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
            <option value="Interview Scheduled">Interview Scheduled</option>
          </select>
          <button class="btn-secondary" onclick="exportCSV('applications')">Export CSV</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Policy OK</th>
                <th>Submitted</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="app-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- SECTION: Activity Log -->
      <div id="section-log" class="section">
        <div class="toolbar">
          <button class="btn-secondary" onclick="loadLog()">Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Action</th>
                <th>Table</th>
                <th>Old Value</th>
                <th>New Value</th>
                <th>Note</th>
              </tr>
            </thead>
            <tbody id="log-tbody"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /app -->

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let waitlistData = [];
let applicationsData = [];
let expandedAppId = null;

// ─── Utilities ────────────────────────────────────────────────────────────────
function fmt(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
}
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function dash(v) { return v || '—'; }
function yn(v) { return v ? 'Yes' : 'No'; }

// ─── Navigation ───────────────────────────────────────────────────────────────
const sectionTitles = { waitlist: 'Waitlist', applications: 'Companion Applications', log: 'Activity Log' };

function showSection(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  document.querySelectorAll('.nav-item, .tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nav-item, .tab-btn').forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + name + "'")) {
      b.classList.add('active');
    }
  });
  document.getElementById('topbar-title').textContent = sectionTitles[name] || name;
  if (name === 'log') loadLog();
}

// ─── Auth / Logout ────────────────────────────────────────────────────────────
async function logout() {
  await fetch('/api/admin/logout', { method: 'POST' });
  window.location.href = '/admin/login';
}

// ─── API helpers ──────────────────────────────────────────────────────────────
async function apiFetch(url) {
  const res = await fetch(url);
  if (res.status === 401) { window.location.href = '/admin/login'; throw new Error('unauth'); }
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ─── Waitlist ─────────────────────────────────────────────────────────────────
async function loadWaitlist() {
  const tbody = document.getElementById('waitlist-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="6">Loading…</td></tr>';
  try {
    waitlistData = await apiFetch('/api/admin/waitlist');
    renderWaitlist();
  } catch(e) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Failed to load: ' + esc(e.message) + '</td></tr>';
  }
}

function renderWaitlist() {
  const q = document.getElementById('waitlist-search').value.toLowerCase();
  const filtered = waitlistData.filter(r =>
    [r.first_name, r.email, r.city].some(v => v && v.toLowerCase().includes(q))
  );
  // Stats
  document.getElementById('waitlist-stats').innerHTML =
    '<div class="stat-chip"><strong>' + waitlistData.length + '</strong> people on the waitlist</div>' +
    (q ? '<div class="stat-chip"><strong>' + filtered.length + '</strong> matching search</div>' : '');
  // Table
  const tbody = document.getElementById('waitlist-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">' + (q ? 'No results.' : 'No signups yet.') + '</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td>${esc(r.first_name) || '—'}</td>
      <td>${esc(r.email) || '—'}</td>
      <td>${esc(r.city) || '—'}</td>
      <td>${esc(r.referral_source) || '—'}</td>
      <td class="truncate" title="${esc(r.interests)}">${esc(r.interests) || '—'}</td>
      <td style="white-space:nowrap">${fmt(r.created_at)}</td>
    </tr>
  `).join('');
}

// ─── Applications ─────────────────────────────────────────────────────────────
async function loadApplications() {
  const tbody = document.getElementById('app-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="8">Loading…</td></tr>';
  try {
    applicationsData = await apiFetch('/api/admin/applications');
    renderApplications();
  } catch(e) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Failed to load: ' + esc(e.message) + '</td></tr>';
  }
}

function statusClass(s) {
  if (s === 'Approved') return 'status-Approved';
  if (s === 'Rejected') return 'status-Rejected';
  if (s === 'Interview Scheduled') return 'status-Interview';
  return 'status-Pending';
}

function renderApplications() {
  const q = document.getElementById('app-search').value.toLowerCase();
  const filterStatus = document.getElementById('app-filter').value;
  let filtered = applicationsData.filter(r => {
    const matchQ = !q || [r.first_name, r.last_name, r.email, r.city].some(v => v && v.toLowerCase().includes(q));
    const matchS = !filterStatus || r.status === filterStatus;
    return matchQ && matchS;
  });
  // Stats
  const counts = { Pending: 0, Approved: 0, Rejected: 0, 'Interview Scheduled': 0 };
  applicationsData.forEach(r => { const s = r.status || 'Pending'; if (s in counts) counts[s]++; });
  document.getElementById('app-stats').innerHTML =
    Object.entries(counts).map(([s, n]) =>
      `<div class="stat-chip"><strong>${n}</strong> ${s}</div>`
    ).join('');
  // Table
  const tbody = document.getElementById('app-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">' + (q || filterStatus ? 'No results.' : 'No applications yet.') + '</td></tr>';
    return;
  }
  const rows = [];
  filtered.forEach(r => {
    const status = r.status || 'Pending';
    const isExpanded = expandedAppId === r.id;
    rows.push(`
      <tr class="expandable" onclick="toggleApp('${esc(r.id)}')" style="cursor:pointer">
        <td><strong>${esc(r.first_name)} ${esc(r.last_name)}</strong></td>
        <td>${esc(r.email)}</td>
        <td>${esc(r.city) || '—'}</td>
        <td>${esc(r.age) || '—'}</td>
        <td>${esc(r.gender) || '—'}</td>
        <td>${yn(r.consent_confirmed)}</td>
        <td style="white-space:nowrap">${fmt(r.created_at)}</td>
        <td onclick="event.stopPropagation()">
          <select class="status-select" data-id="${esc(r.id)}" data-old="${esc(status)}" onchange="updateStatus(this)">
            <option${status==='Pending'?' selected':''}>Pending</option>
            <option${status==='Approved'?' selected':''}>Approved</option>
            <option${status==='Rejected'?' selected':''}>Rejected</option>
            <option value="Interview Scheduled"${status==='Interview Scheduled'?' selected':''}>Interview Scheduled</option>
          </select>
        </td>
      </tr>
    `);
    if (isExpanded) {
      rows.push(`
        <tr class="detail-row">
          <td colspan="8">
            <div class="detail-grid">
              <div class="detail-field"><label>Phone</label><p>${esc(r.phone) || '—'}</p></div>
              <div class="detail-field"><label>Age</label><p>${esc(r.age) || '—'}</p></div>
              <div class="detail-field"><label>Gender</label><p>${esc(r.gender) || '—'}</p></div>
              <div class="detail-field"><label>Orientation</label><p>${esc(r.orientation) || '—'}</p></div>
              <div class="detail-field"><label>Nonsexual Policy Confirmed</label><p>${yn(r.consent_confirmed)}</p></div>
              <div class="detail-field wide"><label>Why They Want to Be a Companion</label><p>${esc(r.motivation) || '—'}</p></div>
              <div class="detail-field wide"><label>Types of Support They're Equipped to Offer</label><p>${esc(r.services) || '—'}</p></div>
            </div>
          </td>
        </tr>
      `);
    }
  });
  tbody.innerHTML = rows.join('');
}

function toggleApp(id) {
  expandedAppId = expandedAppId === id ? null : id;
  renderApplications();
}

async function updateStatus(sel) {
  const id = sel.dataset.id;
  const status = sel.value;
  const old_status = sel.dataset.old;
  sel.disabled = true;
  try {
    const res = await fetch('/api/admin/applications', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, status, old_status }),
    });
    if (res.status === 401) { window.location.href = '/admin/login'; return; }
    if (!res.ok) throw new Error(await res.text());
    // Update local data
    const row = applicationsData.find(r => r.id === id);
    if (row) row.status = status;
    sel.dataset.old = status;
    renderApplications();
  } catch(e) {
    alert('Status update failed: ' + e.message);
    sel.value = old_status;
  }
  sel.disabled = false;
}

// ─── Activity Log ─────────────────────────────────────────────────────────────
async function loadLog() {
  const tbody = document.getElementById('log-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="6">Loading…</td></tr>';
  try {
    const data = await apiFetch('/api/admin/activity-log');
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No activity yet.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td style="white-space:nowrap">${fmt(r.created_at)}</td>
        <td><span class="log-action">${esc(r.action)}</span></td>
        <td>${esc(r.target_table)}</td>
        <td>${esc(r.old_value) || '—'}</td>
        <td>${esc(r.new_value) || '—'}</td>
        <td>${esc(r.note) || '—'}</td>
      </tr>
    `).join('');
  } catch(e) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Failed to load.</td></tr>';
  }
}

// ─── CSV Export ───────────────────────────────────────────────────────────────
function toCSV(rows, cols) {
  const header = cols.map(c => '"' + c.label + '"').join(',');
  const body = rows.map(r =>
    cols.map(c => {
      const v = c.fn ? c.fn(r) : (r[c.key] ?? '');
      return '"' + String(v).replace(/"/g, '""') + '"';
    }).join(',')
  ).join('\n');
  return header + '\n' + body;
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

function exportCSV(type) {
  if (type === 'waitlist') {
    const q = document.getElementById('waitlist-search').value.toLowerCase();
    const rows = waitlistData.filter(r =>
      [r.first_name, r.email, r.city].some(v => v && v.toLowerCase().includes(q))
    );
    const csv = toCSV(rows, [
      { label: 'First Name', key: 'first_name' },
      { label: 'Email', key: 'email' },
      { label: 'City', key: 'city' },
      { label: 'How They Heard', key: 'referral_source' },
      { label: 'Looking For', key: 'interests' },
      { label: 'Notes', key: 'notes' },
      { label: 'Submitted', fn: r => r.created_at ? new Date(r.created_at).toISOString() : '' },
    ]);
    downloadCSV(csv, 'heidi-waitlist.csv');
  } else {
    const q = document.getElementById('app-search').value.toLowerCase();
    const filterStatus = document.getElementById('app-filter').value;
    const rows = applicationsData.filter(r => {
      const matchQ = !q || [r.first_name, r.last_name, r.email, r.city].some(v => v && v.toLowerCase().includes(q));
      const matchS = !filterStatus || r.status === filterStatus;
      return matchQ && matchS;
    });
    const csv = toCSV(rows, [
      { label: 'First Name', key: 'first_name' },
      { label: 'Last Name', key: 'last_name' },
      { label: 'Email', key: 'email' },
      { label: 'Phone', key: 'phone' },
      { label: 'City', key: 'city' },
      { label: 'Gender', key: 'gender' },
      { label: 'Age', key: 'age' },
      { label: 'Motivation', key: 'motivation' },
      { label: 'Services', key: 'services' },
      { label: 'Policy Confirmed', fn: r => yn(r.consent_confirmed) },
      { label: 'Status', fn: r => r.status || 'Pending' },
      { label: 'Submitted', fn: r => r.created_at ? new Date(r.created_at).toISOString() : '' },
    ]);
    downloadCSV(csv, 'heidi-applications.csv');
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadWaitlist();
loadApplications();
</script>
